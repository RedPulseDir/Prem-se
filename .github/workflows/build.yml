                  sh.addView(secLbl("Browser Mode"))
                  var uiSt=uiOn()
                  sh.addView(togRow(Ic.INSPECT,"Show Inspector Tools","Disable for pure browser mode",uiSt){on->
                      uiSt=on; prefs?.edit()?.putBoolean(P_UI,on)?.apply(); applyUi()
                  })
                  sh.addView(div())
                  // Search engine
                  sh.addView(secLbl("Search Engine"))
                  val engs=listOf(EG to "Google",EY to "Yandex",EB to "Bing",ED to "DuckDuckGo",EBR to "Brave")
                  val ce=eng(); val eRws=mutableListOf<LinearLayout>()
                  engs.forEach{(k,n)->
                      val r=engRow(n,k==ce){
                          prefs?.edit()?.putString(P_ENG,k)?.apply()
                          eRws.forEach{rv->
                              val rk=rv.tag as? String?:return@forEach
