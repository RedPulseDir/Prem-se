                          scaleType = ImageView.ScaleType.CENTER_INSIDE
                      }, LinearLayout.LayoutParams(dp(24f),dp(24f)))
                      addView(TextView(this@MainActivity).apply {
                          text = label
                          setTextColor(if (accent) cText else cText3)
