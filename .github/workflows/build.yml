                  },LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                  hdr.addView(icoBtn(Ic.DL,20,cAcc,8).apply{setOnClickListener{saveF("source.html",code);d.dismiss()}},
                      LinearLayout.LayoutParams(dp(38f),dp(38f)))
                  hdr.addView(icoBtn(Ic.X,18,cText3,8).apply{setOnClickListener{d.dismiss()}},
                      LinearLayout.LayoutParams(dp(38f),dp(38f)))
                  sheet.addView(hdr)
                  sheet.addView(TextView(this).apply{text="${code.lines().size} lines · ${code.length} chars"
                      setTextColor(cText3);setTextSize(TypedValue.COMPLEX_UNIT_SP,11f);setPadding(0,dp(4f),0,dp(10f))})
                  val sv=ScrollView(this); val hsv=HorizontalScrollView(this)
