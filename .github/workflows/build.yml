name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Generate all source files
        run: |

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          kotlin.code.style=official
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WebInspector"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }
          android {
              namespace 'com.webinspector.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.webinspector.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.webkit:webkit:1.9.0'
          }
          EOF

          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28"/>
              <application
                  android:allowBackup="true"
                  android:label="WebInspector"
                  android:theme="@style/Theme.App"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#6C63FF</item>
                  <item name="android:windowBackground">#000000</item>
                  <item name="android:statusBarColor">#00000000</item>
                  <item name="android:navigationBarColor">#00000000</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

          mkdir -p app/src/main/java/com/webinspector/app
          cat > app/src/main/java/com/webinspector/app/MainActivity.kt << 'KOTLIN'
          package com.webinspector.app

          import android.annotation.SuppressLint
          import android.app.Dialog
          import android.content.Context
          import android.content.SharedPreferences
          import android.graphics.*
          import android.graphics.drawable.*
          import android.os.*
          import android.util.TypedValue
          import android.view.*
          import android.view.animation.DecelerateInterpolator
          import android.view.inputmethod.EditorInfo
          import android.view.inputmethod.InputMethodManager
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.view.WindowCompat
          import kotlinx.coroutines.*
          import java.io.*
          import java.net.HttpURLConnection
          import java.net.URL
          import java.util.zip.ZipEntry
          import java.util.zip.ZipOutputStream

          class MainActivity : AppCompatActivity() {

              // ── Views ──────────────────────────────────────────────────
              private var webView: WebView? = null
              private var root: FrameLayout? = null
              private var urlBar: EditText? = null
              private var topBar: FrameLayout? = null
              private var bottomBar: FrameLayout? = null
              private var inspBanner: LinearLayout? = null
              private var inspPanel: LinearLayout? = null

              // ── State ──────────────────────────────────────────────────
              private var prefs: SharedPreferences? = null
              private var inspMode = false
              private var curUrl = ""
              private val scope = CoroutineScope(Dispatchers.Main + SupervisorJob())

              // ── Constants ──────────────────────────────────────────────
              companion object {
                  const val P_SHOW_UI = "show_ui"
                  const val P_ENGINE  = "engine"
                  const val EG = "google"
                  const val EY = "yandex"
                  const val EB = "bing"
                  const val ED = "duck"
                  const val EBR = "brave"
              }

              // ── Metrics ────────────────────────────────────────────────
              private fun dp(v: Float): Int = TypedValue.applyDimension(
                  TypedValue.COMPLEX_UNIT_DIP, v, resources.displayMetrics
              ).toInt()

              // ── Colors ─────────────────────────────────────────────────
              private val cBg      = Color.parseColor("#050508")
              private val cAccent  = Color.parseColor("#6C63FF")
              private val cAccent2 = Color.parseColor("#9D50FF")
              private val cText    = Color.WHITE
              private val cText2   = Color.parseColor("#CCFFFFFF")
              private val cText3   = Color.parseColor("#60FFFFFF")
              private val cBorder  = Color.parseColor("#25FFFFFF")
              private val cRipple  = Color.parseColor("#35FFFFFF")
              private val cSuccess = Color.parseColor("#32D74B")

              // ══════════════════════════════════════════════════════════
              //  DRAWABLES
              // ══════════════════════════════════════════════════════════

              /** Multi-layer liquid glass — dark + specular highlight + border */
              private fun glass(r: Float = 22f, tint: Boolean = false): Drawable {
                  val rad = dp(r).toFloat()
                  return object : Drawable() {
                      val p = Paint(Paint.ANTI_ALIAS_FLAG)
                      override fun draw(c: Canvas) {
                          val rc = RectF(bounds)
                          // base dark
                          p.color = Color.parseColor("#D4090910"); p.style = Paint.Style.FILL
                          c.drawRoundRect(rc, rad, rad, p)
                          // glass tint
                          p.color = if (tint) Color.parseColor("#1A6C63FF")
                                    else Color.parseColor("#0EFFFFFF")
                          c.drawRoundRect(rc, rad, rad, p)
                          // top specular
                          p.shader = LinearGradient(
                              0f, rc.top, 0f, rc.top + rc.height() * 0.5f,
                              intArrayOf(Color.parseColor("#28FFFFFF"), Color.TRANSPARENT),
                              null, Shader.TileMode.CLAMP
                          )
                          c.drawRoundRect(RectF(rc.left+1f, rc.top+1f,
                              rc.right-1f, rc.centerY()), rad, rad, p)
                          p.shader = null
                          // border
                          p.color = cBorder; p.style = Paint.Style.STROKE
                          p.strokeWidth = dp(0.6f).toFloat()
                          c.drawRoundRect(rc, rad, rad, p)
                          p.style = Paint.Style.FILL
                      }
                      override fun setAlpha(a: Int) {}
                      override fun setColorFilter(f: ColorFilter?) {}
                      @Suppress("OVERRIDE_DEPRECATION")
                      override fun getOpacity() = PixelFormat.TRANSLUCENT
                  }
              }

              private fun accentGlass(r: Float = 16f): Drawable {
                  val rad = dp(r).toFloat()
                  return object : Drawable() {
                      val p = Paint(Paint.ANTI_ALIAS_FLAG)
                      override fun draw(c: Canvas) {
                          val rc = RectF(bounds)
                          p.shader = LinearGradient(rc.left,rc.top,rc.right,rc.bottom,
                              intArrayOf(cAccent,cAccent2),null,Shader.TileMode.CLAMP)
                          c.drawRoundRect(rc,rad,rad,p); p.shader=null
                          p.color=Color.parseColor("#28FFFFFF")
                          c.drawRoundRect(RectF(rc.left+1f,rc.top+1f,rc.right-1f,rc.centerY()),rad,rad,p)
                      }
                      override fun setAlpha(a: Int) {}
                      override fun setColorFilter(f: ColorFilter?) {}
                      @Suppress("OVERRIDE_DEPRECATION")
                      override fun getOpacity() = PixelFormat.TRANSLUCENT
                  }
              }

              private fun ripple(base: Drawable) = RippleDrawable(
                  android.content.res.ColorStateList.valueOf(cRipple), base, null
              )

              private fun pill(r: Float = 999f): Drawable {
                  val rad = dp(r).toFloat()
                  return object : Drawable() {
                      val p = Paint(Paint.ANTI_ALIAS_FLAG)
                      override fun draw(c: Canvas) {
                          val rc = RectF(bounds)
                          p.color = Color.parseColor("#22FFFFFF")
                          c.drawRoundRect(rc,rad,rad,p)
                          p.color = Color.parseColor("#15FFFFFF"); p.style=Paint.Style.STROKE
                          p.strokeWidth = dp(0.5f).toFloat()
                          c.drawRoundRect(rc,rad,rad,p); p.style=Paint.Style.FILL
                      }
                      override fun setAlpha(a: Int) {}
                      override fun setColorFilter(f: ColorFilter?) {}
                      @Suppress("OVERRIDE_DEPRECATION")
                      override fun getOpacity() = PixelFormat.TRANSLUCENT
                  }
              }

              // ══════════════════════════════════════════════════════════
              //  ICONS — pure Canvas SVG-style
              // ══════════════════════════════════════════════════════════
              enum class Ic {
                  BACK, FWD, REFRESH, INSPECT, CODE, FOLDER,
                  DOWNLOAD, CLOSE, SEARCH, SETTINGS, CHECK,
                  GLOBE, SHIELD, STAR, MENU
              }

              private fun ico(t: Ic, szDp: Int = 22, col: Int = cText): Bitmap {
                  val s = dp(szDp.toFloat())
                  val b = Bitmap.createBitmap(s, s, Bitmap.Config.ARGB_8888)
                  val cv = Canvas(b)
                  val sw = s * 0.09f
                  val st = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                      color = col; style = Paint.Style.STROKE
                      strokeCap = Paint.Cap.ROUND; strokeJoin = Paint.Join.ROUND
                      strokeWidth = sw
                  }
                  val fi = Paint(Paint.ANTI_ALIAS_FLAG).apply {
                      color = col; style = Paint.Style.FILL
                  }
                  val f = s / 24f
                  fun x(v: Float) = v * f
                  fun y(v: Float) = v * f
                  fun path(block: Path.() -> Unit) = Path().apply(block)

                  when (t) {
                      Ic.BACK    -> cv.drawPath(path{ moveTo(x(15f),y(5f));lineTo(x(7f),y(12f));lineTo(x(15f),y(19f)) },st)
                      Ic.FWD     -> cv.drawPath(path{ moveTo(x(9f),y(5f));lineTo(x(17f),y(12f));lineTo(x(9f),y(19f)) },st)
                      Ic.REFRESH -> {
                          cv.drawArc(RectF(x(3.5f),y(3.5f),x(20.5f),y(20.5f)),-85f,275f,false,st)
                          cv.drawPath(path{ moveTo(x(12f),y(1.5f));lineTo(x(15.5f),y(5f));lineTo(x(8.5f),y(5f));close() },fi)
                      }
                      Ic.INSPECT -> {
                          cv.drawCircle(x(12f),y(12f),x(5.5f),st)
                          cv.drawLine(x(12f),y(1.5f),x(12f),y(6.5f),st)
                          cv.drawLine(x(12f),y(17.5f),x(12f),y(22.5f),st)
                          cv.drawLine(x(1.5f),y(12f),x(6.5f),y(12f),st)
                          cv.drawLine(x(17.5f),y(12f),x(22.5f),y(12f),st)
                          cv.drawCircle(x(12f),y(12f),x(1.8f),fi)
                      }
                      Ic.CODE    -> cv.drawPath(path{
                          moveTo(x(8f),y(6f));lineTo(x(2f),y(12f));lineTo(x(8f),y(18f))
                          moveTo(x(16f),y(6f));lineTo(x(22f),y(12f));lineTo(x(16f),y(18f))
                      },st)
                      Ic.FOLDER  -> cv.drawPath(path{
                          moveTo(x(2f),y(8f));lineTo(x(2f),y(19f));lineTo(x(22f),y(19f))
                          lineTo(x(22f),y(9f));lineTo(x(12f),y(9f));lineTo(x(10f),y(7f))
                          lineTo(x(4f),y(7f));close()
                      },st)
                      Ic.DOWNLOAD -> {
                          cv.drawLine(x(12f),y(3f),x(12f),y(15f),st)
                          cv.drawPath(path{moveTo(x(6f),y(10f));lineTo(x(12f),y(16f));lineTo(x(18f),y(10f))},st)
                          cv.drawLine(x(3f),y(20f),x(21f),y(20f),st)
                      }
                      Ic.CLOSE   -> { cv.drawLine(x(5f),y(5f),x(19f),y(19f),st); cv.drawLine(x(19f),y(5f),x(5f),y(19f),st) }
                      Ic.SEARCH  -> { cv.drawCircle(x(10.5f),y(10.5f),x(6f),st); cv.drawLine(x(15f),y(15f),x(21f),y(21f),st) }
                      Ic.SETTINGS -> {
                          cv.drawCircle(x(12f),y(12f),x(3f),st)
                          for (i in 0 until 8) {
                              val a = Math.toRadians(i*45.0)
                              val cos = Math.cos(a).toFloat(); val sin = Math.sin(a).toFloat()
                              cv.drawLine(x(12f)+cos*x(6f),y(12f)+sin*y(6f),
                                          x(12f)+cos*x(9.5f),y(12f)+sin*y(9.5f),st)
                          }
                      }
                      Ic.CHECK   -> cv.drawPath(path{moveTo(x(4f),y(12f));lineTo(x(9f),y(17f));lineTo(x(20f),y(6f))},st)
                      Ic.GLOBE   -> {
                          cv.drawCircle(x(12f),y(12f),x(9f),st)
                          cv.drawLine(x(12f),y(3f),x(12f),y(21f),st)
                          cv.drawArc(RectF(x(5f),y(6f),x(19f),y(18f)),0f,180f,false,st)
                          cv.drawLine(x(3f),y(12f),x(21f),y(12f),st)
                      }
                      Ic.SHIELD  -> cv.drawPath(path{
                          moveTo(x(12f),y(2f));lineTo(x(20f),y(6f));lineTo(x(20f),y(13f))
                          lineTo(x(12f),y(22f));lineTo(x(4f),y(13f));lineTo(x(4f),y(6f));close()
                      },st)
                      Ic.STAR    -> {
                          val p2 = path {
                              val cx=x(12f); val cy=y(12f); val or=x(9f); val ir=x(4f)
                              for (i in 0 until 10) {
                                  val a = Math.toRadians(i*36.0-90.0)
                                  val r = if (i%2==0) or else ir
                                  val px = cx+(Math.cos(a)*r).toFloat()
                                  val py = cy+(Math.sin(a)*r).toFloat()
                                  if (i==0) moveTo(px,py) else lineTo(px,py)
                              }; close()
                          }; cv.drawPath(p2,st)
                      }
                      Ic.MENU    -> {
                          cv.drawLine(x(3f),y(7f),x(21f),y(7f),st)
                          cv.drawLine(x(3f),y(12f),x(21f),y(12f),st)
                          cv.drawLine(x(3f),y(17f),x(21f),y(17f),st)
                      }
                  }
                  return b
              }

              private fun icoView(t: Ic, sz: Int=22, col: Int=cText, pad: Int=10): ImageView {
                  return ImageView(this).apply {
                      setImageBitmap(ico(t,sz,col))
                      scaleType = ImageView.ScaleType.CENTER_INSIDE
                      val p = dp(pad.toFloat())
                      setPadding(p,p,p,p)
                      background = ripple(ColorDrawable(Color.TRANSPARENT))
                  }
              }

              // ══════════════════════════════════════════════════════════
              //  onCreate
              // ══════════════════════════════════════════════════════════
              @SuppressLint("SetJavaScriptEnabled")
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  try {
                      prefs = getSharedPreferences("prefs", Context.MODE_PRIVATE)

                      WindowCompat.setDecorFitsSystemWindows(window, false)
                      window.statusBarColor = Color.TRANSPARENT
                      window.navigationBarColor = Color.TRANSPARENT
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                          window.insetsController?.hide(
                              android.view.WindowInsets.Type.navigationBars()
                          )
                      }

                      root = FrameLayout(this)
                      root!!.setBackgroundColor(cBg)
                      setContentView(root)

                      buildWebView()
                      buildTopBar()
                      buildBottomBar()
                      buildInspector()

                      applyUi()
                      loadHome()

                  } catch (e: Exception) {
                      Toast.makeText(this, "Init error: ${e.message}", Toast.LENGTH_LONG).show()
                  }
              }

              // ── Prefs helpers ──────────────────────────────────────────
              private fun getEngine() = prefs?.getString(P_ENGINE, EG) ?: EG
              private fun getShowUi() = prefs?.getBoolean(P_SHOW_UI, true) ?: true

              private fun applyUi() {
                  val show = getShowUi()
                  topBar?.visibility    = if (show) View.VISIBLE else View.GONE
                  bottomBar?.visibility = if (show) View.VISIBLE else View.GONE
              }

              private fun loadHome() {
                  val url = when (getEngine()) {
                      EY  -> "https://yandex.ru"
                      EB  -> "https://bing.com"
                      ED  -> "https://duckduckgo.com"
                      EBR -> "https://search.brave.com"
                      else -> "https://google.com"
                  }
                  webView?.loadUrl(url)
              }

              private fun searchUrl(q: String): String {
                  val eq = q.replace(" ","+")
                  return when (getEngine()) {
                      EY  -> "https://yandex.ru/search/?text=$eq"
                      EB  -> "https://bing.com/search?q=$eq"
                      ED  -> "https://duckduckgo.com/?q=$eq"
                      EBR -> "https://search.brave.com/search?q=$eq"
                      else -> "https://google.com/search?q=$eq"
                  }
              }

              // ══════════════════════════════════════════════════════════
              //  WEBVIEW
              // ══════════════════════════════════════════════════════════
              @SuppressLint("SetJavaScriptEnabled")
              private fun buildWebView() {
                  webView = WebView(this).apply {
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                      )
                      settings.apply {
                          javaScriptEnabled = true
                          domStorageEnabled = true
                          loadWithOverviewMode = true
                          useWideViewPort = true
                          builtInZoomControls = true
                          displayZoomControls = false
                          mixedContentMode = WebSettings.MIXED_CONTENT_ALWAYS_ALLOW
                      }
                      addJavascriptInterface(JsBridge(), "WebInspector")
                      webViewClient = object : WebViewClient() {
                          override fun onPageFinished(view: WebView, url: String) {
                              curUrl = url
                              urlBar?.setText(url)
                              urlBar?.setSelection(0)
                          }
                          override fun shouldOverrideUrlLoading(
                              view: WebView, req: WebResourceRequest
                          ) = false
                      }
                      webChromeClient = WebChromeClient()
                  }
                  root!!.addView(webView)
              }

              // ══════════════════════════════════════════════════════════
              //  TOP BAR
              // ══════════════════════════════════════════════════════════
              private fun buildTopBar() {
                  val frame = FrameLayout(this).apply {
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.WRAP_CONTENT,
                          Gravity.TOP
                      )
                  }

                  // Scrim
                  frame.addView(View(this).apply {
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT, dp(130f)
                      )
                      background = GradientDrawable(
                          GradientDrawable.Orientation.TOP_BOTTOM,
                          intArrayOf(Color.parseColor("#F2000000"), Color.TRANSPARENT)
                      )
                  })

                  // Row
                  val row = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      gravity = Gravity.CENTER_VERTICAL
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.WRAP_CONTENT
                      ).apply { setMargins(dp(10f),dp(52f),dp(10f),dp(8f)) }
                  }

                  // Glass pill for URL
                  val pill = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      gravity = Gravity.CENTER_VERTICAL
                      background = glass(28f)
                      elevation = dp(2f).toFloat()
                      setPadding(dp(4f),dp(4f),dp(4f),dp(4f))
                  }

                  val btnBack = icoView(Ic.BACK,18,cText2,8).apply {
                      setOnClickListener { webView?.let { if (it.canGoBack()) it.goBack() } }
                  }
                  val btnFwd = icoView(Ic.FWD,18,cText2,8).apply {
                      setOnClickListener { webView?.let { if (it.canGoForward()) it.goForward() } }
                  }
                  val btnRef = icoView(Ic.REFRESH,18,cText2,8).apply {
                      setOnClickListener { webView?.reload() }
                  }
                  val btnSet = icoView(Ic.SETTINGS,18,cText2,8).apply {
                      setOnClickListener { showSettings() }
                  }

                  // Inner URL field
                  val urlField = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      gravity = Gravity.CENTER_VERTICAL
                      background = pill()
                      setPadding(dp(10f),0,dp(8f),0)
                  }
                  urlField.addView(ImageView(this).apply {
                      setImageBitmap(ico(Ic.GLOBE,13,cText3))
                      scaleType = ImageView.ScaleType.CENTER_INSIDE
                  }, LinearLayout.LayoutParams(dp(16f),dp(16f)))

                  urlBar = EditText(this).apply {
                      background = null
                      setTextColor(cText)
                      setHintTextColor(cText3)
                      hint = "Search or URL"
                      setTextSize(TypedValue.COMPLEX_UNIT_SP, 14f)
                      maxLines = 1
                      imeOptions = EditorInfo.IME_ACTION_GO
                      inputType = android.text.InputType.TYPE_CLASS_TEXT or
                              android.text.InputType.TYPE_TEXT_VARIATION_URI
                      setOnEditorActionListener { _, id, _ ->
                          if (id == EditorInfo.IME_ACTION_GO) { navigate(); true } else false
                      }
                      setOnFocusChangeListener { _, hasFocus -> if (hasFocus) selectAll() }
                  }
                  urlField.addView(urlBar, LinearLayout.LayoutParams(
                      0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f
                  ).apply { setMargins(dp(6f),0,0,0) })

                  pill.addView(btnBack, LinearLayout.LayoutParams(dp(36f),dp(36f)))
                  pill.addView(btnFwd,  LinearLayout.LayoutParams(dp(36f),dp(36f)))
                  pill.addView(urlField, LinearLayout.LayoutParams(0,dp(34f),1f).apply {
                      setMargins(dp(3f),0,dp(3f),0)
                  })
                  pill.addView(btnRef, LinearLayout.LayoutParams(dp(36f),dp(36f)))
                  pill.addView(btnSet, LinearLayout.LayoutParams(dp(36f),dp(36f)))

                  row.addView(pill, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT
                  ))
                  frame.addView(row)

                  topBar = frame
                  root!!.addView(frame)
              }

              private fun navigate() {
                  val raw = urlBar?.text?.toString()?.trim() ?: return
                  if (raw.isEmpty()) return
                  val url = when {
                      raw.startsWith("http://") || raw.startsWith("https://") -> raw
                      raw.contains(".") && !raw.contains(" ") -> "https://$raw"
                      else -> searchUrl(raw)
                  }
                  webView?.loadUrl(url)
                  val imm = getSystemService(Context.INPUT_METHOD_SERVICE) as? InputMethodManager
                  imm?.hideSoftInputFromWindow(urlBar?.windowToken, 0)
                  urlBar?.clearFocus()
              }

              // ══════════════════════════════════════════════════════════
              //  BOTTOM BAR
              // ══════════════════════════════════════════════════════════
              private fun buildBottomBar() {
                  val frame = FrameLayout(this).apply {
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.WRAP_CONTENT,
                          Gravity.BOTTOM
                      )
                  }
                  frame.addView(View(this).apply {
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT, dp(120f)
                      )
                      background = GradientDrawable(
                          GradientDrawable.Orientation.BOTTOM_TOP,
                          intArrayOf(Color.parseColor("#F2000000"), Color.TRANSPARENT)
                      )
                  })

                  val row = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      gravity = Gravity.CENTER
                      layoutParams = FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                      ).apply { setMargins(dp(14f),0,dp(14f),dp(32f)) }
                  }

                  val pill = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      gravity = Gravity.CENTER
                      background = glass(32f)
                      elevation = dp(4f).toFloat()
                      setPadding(dp(8f),dp(6f),dp(8f),dp(6f))
                  }

                  pill.addView(mkToolBtn(Ic.INSPECT,"Inspect",true){ toggleInspector() })
                  pill.addView(mkDivider())
                  pill.addView(mkToolBtn(Ic.CODE,"Source"){ showSource() })
                  pill.addView(mkDivider())
                  pill.addView(mkToolBtn(Ic.FOLDER,"Files"){ showFiles() })

                  row.addView(pill, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT
                  ))
                  frame.addView(row)

                  bottomBar = frame
                  root!!.addView(frame)
