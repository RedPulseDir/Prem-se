              private fun buildInsp() {
                  banner=LinearLayout(this).apply{
                      orientation=LinearLayout.HORIZONTAL; gravity=Gravity.CENTER_VERTICAL
                      background=bannerBg(); setPadding(dp(14f),dp(10f),dp(10f),dp(10f))
                      elevation=dp(8f).toFloat(); visibility=View.GONE
                  }
                  banner!!.addView(ImageView(this).apply{
                      setImageBitmap(ico(Ic.INSPECT,16,cW)); scaleType=ImageView.ScaleType.CENTER_INSIDE
                  },LinearLayout.LayoutParams(dp(20f),dp(20f)))
                  banner!!.addView(TextView(this).apply{
                      text="  Tap element to inspect"; setTextColor(cW)
                      setTextSize(TypedValue.COMPLEX_UNIT_SP,13f)
                  },LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                  banner!!.addView(icoV(Ic.X,16,cW,8).apply{setOnClickListener{toggleInsp()}},
                      LinearLayout.LayoutParams(dp(34f),dp(34f)))
                  root!!.addView(banner,FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,ViewGroup.LayoutParams.WRAP_CONTENT,Gravity.TOP
                  ).apply{setMargins(dp(14f),dp(112f),dp(14f),0)})

                  panel=LinearLayout(this).apply{
                      orientation=LinearLayout.VERTICAL; background=glass(26f)
                      setPadding(dp(16f),dp(14f),dp(16f),dp(18f))
                      elevation=dp(16f).toFloat(); visibility=View.GONE
                  }
                  root!!.addView(panel,FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,dp(330f),Gravity.BOTTOM
                  ).apply{setMargins(dp(8f),0,dp(8f),dp(104f))})
              }

              private fun toggleInsp() {
                  inspOn=!inspOn
                  if(inspOn){
                      banner?.apply{visibility=View.VISIBLE;alpha=0f;translationY=-dp(16f).toFloat()
                          animate().alpha(1f).translationY(0f).setDuration(280)
                              .setInterpolator(DecelerateInterpolator(2f)).start()}
                      wv?.evaluateJavascript(jsInsp(),null)
                  } else {
                      banner?.animate()?.alpha(0f)?.setDuration(180)?.withEndAction{
                          banner?.visibility=View.GONE; banner?.alpha=1f}?.start()
                      panelDn()
                      wv?.evaluateJavascript("try{window.__wc&&window.__wc()}catch(e){}",null)
                  }
              }

              private fun panelDn(){
                  val p=panel?:return; if(p.visibility!=View.VISIBLE)return
                  p.animate().translationY(dp(600f).toFloat()).setDuration(260)
                      .setInterpolator(DecelerateInterpolator(2f)).withEndAction{
                          p.visibility=View.GONE; p.translationY=0f}.start()
              }

              private fun panelUp(){
                  val p=panel?:return
                  p.visibility=View.VISIBLE; p.translationY=dp(600f).toFloat()
                  p.animate().translationY(0f).setDuration(360).setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

              private fun showEl(tag:String,id:String,html:String,css:String){
                  val pn=panel?:return; pn.removeAllViews()
                  // Header
                  val hdr=LinearLayout(this).apply{orientation=LinearLayout.HORIZONTAL;gravity=Gravity.CENTER_VERTICAL}
                  hdr.addView(chip("<$tag>",cAcc)); if(id.isNotEmpty())hdr.addView(chip("#$id",cOk))
                  hdr.addView(View(this),LinearLayout.LayoutParams(0,1,1f))
                  hdr.addView(icoV(Ic.X,16,cW40,6).apply{setOnClickListener{panelDn()}},
                      LinearLayout.LayoutParams(dp(30f),dp(30f)))
                  pn.addView(hdr)
                  // Tab strip
                  val tabs=LinearLayout(this).apply{
                      orientation=LinearLayout.HORIZONTAL; background=tabBg()
                      setPadding(dp(3f),dp(3f),dp(3f),dp(3f))
                  }
                  pn.addView(tabs,LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,dp(38f)).apply{setMargins(0,dp(10f),0,dp(8f))})
                  val content=LinearLayout(this).apply{orientation=LinearLayout.VERTICAL}
                  val sv=ScrollView(this); sv.addView(content)
                  pn.addView(sv,LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT,0,1f))

                  var cur=0; val tvs=mutableListOf<TextView>()
                  fun selTab(i:Int){
                      tvs.forEachIndexed{idx,tv->
                          tv.background=if(idx==i)accG(9f) else null
                          tv.setTextColor(if(idx==i)cW else cW40)}
                      content.removeAllViews()
                      when(i){
                          0->{
                              val et=EditText(this).apply{
                                  setText(html); setTextColor(Color.parseColor("#E2E8F0"))
                                  setTextSize(TypedValue.COMPLEX_UNIT_SP,11.5f); background=codeBg()
                                  typeface=Typeface.MONOSPACE; setPadding(dp(12f),dp(12f),dp(12f),dp(12f))
                                  gravity=Gravity.TOP; minLines=5; setHorizontallyScrolling(false)
                              }
                              content.addView(et)
                              content.addView(TextView(this).apply{
                                  text="Apply Changes"; gravity=Gravity.CENTER; setTextColor(cW)
                                  setTextSize(TypedValue.COMPLEX_UNIT_SP,14f)
                                  typeface=Typeface.create("sans-serif-medium",Typeface.NORMAL)
                                  background=rip(accG(12f))
                                  setOnClickListener{
                                      val esc=et.text.toString()
                                          .replace("\\","\\\\").replace("'","\\'").replace("\n","\\n")
                                      wv?.evaluateJavascript(
                                          "try{window.__ws&&(window.__ws.outerHTML='$esc')}catch(e){}",null)
                                      toast("Applied!")
                                  }
                              },LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT,dp(46f)).apply{setMargins(0,dp(8f),0,0)})
                          }
                          1->content.addView(TextView(this).apply{
                              text=css; setTextColor(Color.parseColor("#7FDBCA"))
                              setTextSize(TypedValue.COMPLEX_UNIT_SP,11.5f); background=codeBg()
                              typeface=Typeface.MONOSPACE; setPadding(dp(12f),dp(12f),dp(12f),dp(12f))
                              setTextIsSelectable(true)
                          })
                          2->{
                              val wv2=WebView(this); wv2.settings.javaScriptEnabled=true
                              wv2.loadDataWithBaseURL(curUrl,
                                  "<html><body style='margin:10px;background:#fff'>$html</body></html>",
                                  "text/html","UTF-8",null)
                              content.addView(wv2,LinearLayout.LayoutParams(
                                  LinearLayout.LayoutParams.MATCH_PARENT,dp(200f)))
                          }
                      }
                  }
                  listOf("HTML","CSS","Preview").forEachIndexed{i,name->
                      val tv=TextView(this).apply{
                          text=name; gravity=Gravity.CENTER
                          setTextSize(TypedValue.COMPLEX_UNIT_SP,13f)
                          typeface=Typeface.create("sans-serif-medium",Typeface.NORMAL)
                          background=if(i==0)accG(9f) else null
                          setTextColor(if(i==0)cW else cW40)
                          setPadding(dp(4f),dp(3f),dp(4f),dp(3f))
                          setOnClickListener{cur=i;selTab(i)}
                      }
                      tvs.add(tv)
                      tabs.addView(tv,LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.MATCH_PARENT,1f))
                  }
                  selTab(0); panelUp()
              }

