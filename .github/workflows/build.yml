              private fun togRow(ic:Ic,title:String,sub:String,init:Boolean,cb:(Boolean)->Unit):LinearLayout{
                  var st=init
                  val track=GradientDrawable().apply{
                      setColor(if(st)cAcc else Color.parseColor("#38FFFFFF")); cornerRadius=dp(14f).toFloat()}
                  val thumb=View(this).apply{
                      background=GradientDrawable().apply{setColor(Color.WHITE);cornerRadius=dp(11f).toFloat()
                          setStroke(1,Color.parseColor("#15000000"))}; elevation=dp(2f).toFloat()
                  }
                  val tog=FrameLayout(this).apply{
                      background=track
                      addView(thumb,FrameLayout.LayoutParams(dp(22f),dp(28f),Gravity.CENTER_VERTICAL).apply{
                          setMargins(if(st)dp(24f) else dp(3f),0,0,0)})
                  }
                  return LinearLayout(this).apply{
                      orientation=LinearLayout.HORIZONTAL; gravity=Gravity.CENTER_VERTICAL
                      setPadding(0,dp(10f),0,dp(10f)); background=rip(ColorDrawable(Color.TRANSPARENT))
                      setOnClickListener{
                          st=!st; track.setColor(if(st)cAcc else Color.parseColor("#38FFFFFF"))
                          val toM=if(st)dp(24f) else dp(3f)
                          thumb.animate().translationX((toM-thumb.left).toFloat()).setDuration(200)
                              .setInterpolator(DecelerateInterpolator(2f)).withEndAction{
                                  (thumb.layoutParams as FrameLayout.LayoutParams).setMargins(toM,0,0,0)
                                  thumb.translationX=0f; thumb.requestLayout()}.start()
                          cb(st)
                      }
                      addView(ImageView(this@MainActivity).apply{setImageBitmap(ico(ic,20,cW80))},
                          LinearLayout.LayoutParams(dp(22f),dp(22f)).apply{setMargins(0,0,dp(14f),0)})
                      addView(LinearLayout(this@MainActivity).apply{
                          orientation=LinearLayout.VERTICAL
                          addView(TextView(this@MainActivity).apply{text=title;setTextColor(cW80);setTextSize(TypedValue.COMPLEX_UNIT_SP,15f)})
                          addView(TextView(this@MainActivity).apply{text=sub;setTextColor(cW40);setTextSize(TypedValue.COMPLEX_UNIT_SP,12f)})
                      },LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                      addView(tog,LinearLayout.LayoutParams(dp(48f),dp(28f)))
                  }
              }

