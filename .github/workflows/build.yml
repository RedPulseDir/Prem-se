              private fun mkDivider() = View(this).apply {
                  setBackgroundColor(Color.parseColor("#28FFFFFF"))
                  layoutParams = LinearLayout.LayoutParams(1,dp(26f)).apply {
                      setMargins(dp(3f),0,dp(3f),0)
                  }
              }

              private fun mkToolBtn(ic: Ic, label: String, accent: Boolean=false, cb: ()->Unit): LinearLayout {
