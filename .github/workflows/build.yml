              // ══════════════════════════════════════════════════════════
              private fun showFiles() {
                  webView?.evaluateJavascript("""
                      (function(){var r={js:[],css:[],img:[]};
                      document.querySelectorAll('script[src]').forEach(function(s){r.js.push(s.src);});
                      document.querySelectorAll('link[rel=stylesheet]').forEach(function(l){r.css.push(l.href);});
                      document.querySelectorAll('img[src]').forEach(function(i){r.img.push(i.src);});
                      return JSON.stringify(r);})();
                  """.trimIndent()){res->
                      val json=res?.removeSurrounding("\"")?.replace("\\\"","\"")?:"{}"
                      showFilesSheet(json)
                  }
              }

              private fun showFilesSheet(json:String) {
                  val secs= mutableListOf<Pair<String,List<String>>>()
                  listOf("js" to "Scripts","css" to "Styles","img" to "Images").forEach{(k,lbl)->
                      val m=Regex(""""$k":\[([^\]]*)]""").find(json)
                      if(m!=null){
                          val urls=Regex(""""(https?://[^"]+)"""").findAll(m.groupValues[1])
                              .map{it.groupValues[1]}.toList()
                          if(urls.isNotEmpty())secs.add(lbl to urls)
                      }
                  }
                  val allUrls=secs.flatMap{it.second}
                  val d=Dialog(this,android.R.style.Theme_NoTitleBar_Fullscreen)
                  val overlay=FrameLayout(this).apply{setBackgroundColor(Color.parseColor("#88000000"));setOnClickListener{d.dismiss()}}
                  val sheet=LinearLayout(this).apply{orientation=LinearLayout.VERTICAL;background=glass(28f)
                      setPadding(dp(16f),dp(14f),dp(16f),dp(20f));elevation=dp(20f).toFloat();setOnClickListener{}}
                  val hdr=LinearLayout(this).apply{orientation=LinearLayout.HORIZONTAL;gravity=Gravity.CENTER_VERTICAL}
                  hdr.addView(TextView(this).apply{text="Site Files";setTextColor(cText);setTextSize(TypedValue.COMPLEX_UNIT_SP,18f)
                      typeface=Typeface.create("sans-serif-medium",Typeface.NORMAL)
                  },LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                  hdr.addView(icoBtn(Ic.X,18,cText3,8).apply{setOnClickListener{d.dismiss()}},
                      LinearLayout.LayoutParams(dp(38f),dp(38f)))
                  sheet.addView(hdr)
                  sheet.addView(TextView(this).apply{text="${allUrls.size} resources";setTextColor(cText3)
                      setTextSize(TypedValue.COMPLEX_UNIT_SP,11f);setPadding(0,dp(4f),0,dp(8f))})
                  val sv=ScrollView(this); val list=LinearLayout(this).apply{orientation=LinearLayout.VERTICAL}
                  secs.forEach{(lbl,urls)->
                      list.addView(TextView(this).apply{text=lbl.uppercase();setTextColor(cAcc)
                          setTextSize(TypedValue.COMPLEX_UNIT_SP,10.5f)
                          typeface=Typeface.create("sans-serif-medium",Typeface.NORMAL)
                          setPadding(dp(2f),dp(12f),0,dp(4f))})
                      urls.forEach{url->
                          val fIc=if(url.endsWith(".js"))Ic.CODE else if(url.endsWith(".css"))Ic.STAR else Ic.DL
                          list.addView(LinearLayout(this).apply{
                              orientation=LinearLayout.HORIZONTAL;gravity=Gravity.CENTER_VERTICAL
                              background=rip(object:Drawable(){
                                  val p=Paint(Paint.ANTI_ALIAS_FLAG)
                                  override fun draw(c:Canvas){p.color=Color.parseColor("#12FFFFFF")
                                      c.drawRoundRect(RectF(bounds),dp(10f).toFloat(),dp(10f).toFloat(),p)}
                                  override fun setAlpha(a:Int){}; override fun setColorFilter(f:ColorFilter?){}
                                  @Suppress("OVERRIDE_DEPRECATION") override fun getOpacity()=PixelFormat.TRANSLUCENT
                              })
                              setPadding(dp(10f),dp(9f),dp(10f),dp(9f))
                              setOnClickListener{showCode(url.substringAfterLast("/"),url)}
                              addView(ImageView(this@MainActivity).apply{setImageBitmap(ico(fIc,15,cText3))},
                                  LinearLayout.LayoutParams(dp(20f),dp(20f)).apply{setMargins(0,0,dp(10f),0)})
                              addView(LinearLayout(this@MainActivity).apply{
                                  orientation=LinearLayout.VERTICAL
                                  addView(TextView(this@MainActivity).apply{text=url.substringAfterLast("/").take(42)
                                      setTextColor(cText2);setTextSize(TypedValue.COMPLEX_UNIT_SP,12.5f)})
                                  addView(TextView(this@MainActivity).apply{text=url.substringAfter("://").substringBefore("/")
                                      setTextColor(cText3);setTextSize(TypedValue.COMPLEX_UNIT_SP,10.5f)})
                              },LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                              addView(icoBtn(Ic.DL,14,cText3,4).apply{setOnClickListener{dlFile(url)}},
                                  LinearLayout.LayoutParams(dp(24f),dp(24f)))
                          },LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT,
                              ViewGroup.LayoutParams.WRAP_CONTENT).apply{setMargins(0,dp(2f),0,dp(2f))})
                      }
                  }
                  sv.addView(list); sheet.addView(sv,LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT,0,1f))
                  sheet.addView(TextView(this).apply{text="↓  Download ZIP";gravity=Gravity.CENTER;setTextColor(cText)
                      setTextSize(TypedValue.COMPLEX_UNIT_SP,14f)
                      typeface=Typeface.create("sans-serif-medium",Typeface.NORMAL)
                      background=rip(accGlass(14f)); setOnClickListener{d.dismiss();dlZip(allUrls)}
                  },LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT,dp(50f)).apply{setMargins(0,dp(12f),0,0)})
                  val h=(resources.displayMetrics.heightPixels*0.86).toInt()
                  overlay.addView(sheet,FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,h,Gravity.BOTTOM).apply{setMargins(dp(6f),0,dp(6f),0)})
                  d.setContentView(overlay);d.show()
                  sheet.translationY=h.toFloat()
                  sheet.animate().translationY(0f).setDuration(370).setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

              private fun dlFile(url:String){
                  toast("Downloading…")
                  scope.launch(Dispatchers.IO){
                      try{
                          val conn=URL(url).openConnection() as HttpURLConnection
                          conn.connectTimeout=8000;conn.readTimeout=8000;conn.connect()
                          if(conn.responseCode==200){
                              val n=url.substringAfterLast("/").take(80).ifEmpty{"file"}
                              val f=File(getExternalFilesDir(null)?:filesDir,n)
                              f.outputStream().use{conn.inputStream.copyTo(it)}
                              withContext(Dispatchers.Main){toast("Saved: ${f.name}")}
                          }
                      }catch(e:Exception){withContext(Dispatchers.Main){toast("Error: ${e.message}")}}
                  }
              }

              private fun dlZip(urls:List<String>){
                  if(urls.isEmpty()){toast("No files");return}
                  toast("Zipping ${urls.size} files…")
                  scope.launch(Dispatchers.IO){
                      try{
                          val dir=getExternalFilesDir(null)?:filesDir
                          val zip=File(dir,"site_${System.currentTimeMillis()}.zip")
                          ZipOutputStream(BufferedOutputStream(FileOutputStream(zip))).use{zos->
                              urls.take(60).forEach{url->
                                  try{
                                      val conn=URL(url).openConnection() as HttpURLConnection
                                      conn.connectTimeout=5000;conn.readTimeout=5000;conn.connect()
                                      if(conn.responseCode==200){
                                          val n=url.substringAfterLast("/").take(80).ifEmpty{"file"}
                                          zos.putNextEntry(ZipEntry(n));conn.inputStream.copyTo(zos);zos.closeEntry()
                                      }
                                  }catch(_:Exception){}
                              }
                          }
                          withContext(Dispatchers.Main){toast("ZIP: ${zip.name}")}
                      }catch(e:Exception){withContext(Dispatchers.Main){toast("Zip error: ${e.message}")}}
                  }
              }

              // ══════════════════════════════════════════════════════════
              //  JS Bridge
              // ══════════════════════════════════════════════════════════
              private fun jsInsp()="""
                  (function(){try{
                      var s=document.createElement('style');s.id='__wis';
                      s.textContent='.wi{outline:2px solid #6C63FF!important;background:rgba(108,99,255,0.06)!important}';
                      document.head.appendChild(s);
                      window.__ws=null;
                      function ov(e){document.querySelectorAll('.wi').forEach(function(x){x.classList.remove('wi');});e.target.classList.add('wi');}
                      function cl(e){e.preventDefault();e.stopPropagation();window.__ws=e.target;
                          var el=e.target,tag=el.tagName.toLowerCase(),id=el.id||'';
                          var html=el.outerHTML.substring(0,2000);
                          var cs=window.getComputedStyle(el);
                          var pp=['display','position','width','height','color','background-color',
                              'font-size','font-weight','border','border-radius','margin','padding'];
                          var css=pp.map(function(p){return p+': '+cs.getPropertyValue(p)+';'}).join('\n');
                          window.WebInspector.onEl(tag,id,encodeURIComponent(html),encodeURIComponent(css));}
                      document.addEventListener('mouseover',ov,true);
                      document.addEventListener('click',cl,true);
                      window.__wc=function(){document.removeEventListener('mouseover',ov,true);
                          document.removeEventListener('click',cl,true);
                          document.querySelectorAll('.wi').forEach(function(x){x.classList.remove('wi');});
                          var st=document.getElementById('__wis');if(st)st.remove();};
                  }catch(err){}})();
              """.trimIndent()

              inner class JsBridge {
                  @JavascriptInterface
                  fun onEl(tag:String,id:String,hEnc:String,cEnc:String){
                      val h=try{java.net.URLDecoder.decode(hEnc,"UTF-8")}catch(e:Exception){hEnc}
                      val c=try{java.net.URLDecoder.decode(cEnc,"UTF-8")}catch(e:Exception){cEnc}
                      runOnUiThread{showEl(tag,id,h,c)}
                  }
              }

              private fun saveF(name:String,content:String){
                  try{File(getExternalFilesDir(null)?:filesDir,name).writeText(content);toast("Saved!")}
                  catch(e:Exception){toast("Save error: ${e.message}")}
              }

              private fun toast(msg:String)=Toast.makeText(this,msg,Toast.LENGTH_SHORT).show()

              @Suppress("OVERRIDE_DEPRECATION")
              override fun onBackPressed(){
                  when{inspMode->toggleInsp(); webView?.canGoBack()==true->webView?.goBack()
                      else->super.onBackPressed()}
              }

              override fun onDestroy(){
                  super.onDestroy(); scope.cancel()
                  webView?.stopLoading(); webView?.destroy(); webView=null
              }
          }
          KOTLIN

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools \
             $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk"             >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk"         >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools"           >> $GITHUB_PATH

