              // ══════════════════════════════════════════════════════════
              //  INSPECTOR
              // ══════════════════════════════════════════════════════════
              private fun buildInspector() {
                  // Banner
                  inspBanner = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      gravity = Gravity.CENTER_VERTICAL
                      background = object : Drawable() {
                          val p = Paint(Paint.ANTI_ALIAS_FLAG)
                          override fun draw(c: Canvas) {
                              val rc = RectF(bounds); val r = dp(20f).toFloat()
                              p.shader = LinearGradient(0f,0f,rc.width(),0f,
                                  intArrayOf(Color.parseColor("#DD6C63FF"),Color.parseColor("#DD9D50FF")),
                                  null,Shader.TileMode.CLAMP)
                              c.drawRoundRect(rc,r,r,p); p.shader=null
                              p.color=Color.parseColor("#30FFFFFF")
                              c.drawRoundRect(RectF(rc.left+1f,rc.top+1f,rc.right-1f,rc.centerY()),r,r,p)
                          }
                          override fun setAlpha(a: Int) {}
                          override fun setColorFilter(f: ColorFilter?) {}
                          @Suppress("OVERRIDE_DEPRECATION")
                          override fun getOpacity() = PixelFormat.TRANSLUCENT
                      }
                      setPadding(dp(14f),dp(10f),dp(10f),dp(10f))
                      elevation = dp(8f).toFloat()
                      visibility = View.GONE
                  }
                  inspBanner!!.addView(ImageView(this).apply {
                      setImageBitmap(ico(Ic.INSPECT,16,cText))
                      scaleType = ImageView.ScaleType.CENTER_INSIDE
                  }, LinearLayout.LayoutParams(dp(20f),dp(20f)))
                  inspBanner!!.addView(TextView(this).apply {
                      text = "  Tap element to inspect"
                      setTextColor(cText); setTextSize(TypedValue.COMPLEX_UNIT_SP,13f)
                  }, LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                  inspBanner!!.addView(icoView(Ic.CLOSE,16,cText,8).apply {
                      setOnClickListener { toggleInspector() }
                  }, LinearLayout.LayoutParams(dp(34f),dp(34f)))

                  root!!.addView(inspBanner, FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.WRAP_CONTENT, Gravity.TOP
                  ).apply { setMargins(dp(14f),dp(112f),dp(14f),0) })

                  // Panel
                  inspPanel = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      background = glass(26f)
                      setPadding(dp(16f),dp(14f),dp(16f),dp(18f))
                      elevation = dp(16f).toFloat()
                      visibility = View.GONE
                  }
                  root!!.addView(inspPanel, FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT, dp(330f), Gravity.BOTTOM
                  ).apply { setMargins(dp(8f),0,dp(8f),dp(104f)) })
              }

              private fun toggleInspector() {
                  inspMode = !inspMode
                  if (inspMode) {
                      inspBanner?.apply {
                          visibility = View.VISIBLE; alpha = 0f
                          translationY = -dp(16f).toFloat()
                          animate().alpha(1f).translationY(0f).setDuration(280)
                              .setInterpolator(DecelerateInterpolator(2f)).start()
                      }
                      webView?.evaluateJavascript(jsInspect(), null)
                  } else {
                      inspBanner?.animate()?.alpha(0f)?.setDuration(180)?.withEndAction {
                          inspBanner?.visibility = View.GONE
                          inspBanner?.alpha = 1f
                      }?.start()
                      slideDownPanel()
                      webView?.evaluateJavascript("try{window.__wiClean&&window.__wiClean()}catch(e){}", null)
                  }
              }

              private fun slideDownPanel() {
                  val panel = inspPanel ?: return
                  if (panel.visibility != View.VISIBLE) return
                  panel.animate().translationY(dp(600f).toFloat()).setDuration(260)
                      .setInterpolator(DecelerateInterpolator(2f)).withEndAction {
                          panel.visibility = View.GONE; panel.translationY = 0f
                      }.start()
              }

              private fun slideUpPanel() {
                  val panel = inspPanel ?: return
                  panel.visibility = View.VISIBLE
                  panel.translationY = dp(600f).toFloat()
                  panel.animate().translationY(0f).setDuration(360)
                      .setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

              // ── Element panel content ──────────────────────────────────
              private fun showElement(tag: String, id: String, html: String, css: String) {
                  val panel = inspPanel ?: return
                  panel.removeAllViews()

                  // Header
                  val hdr = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                  }
                  hdr.addView(chip("<$tag>", cAccent))
                  if (id.isNotEmpty()) hdr.addView(chip("#$id", cSuccess))
                  hdr.addView(View(this), LinearLayout.LayoutParams(0,1,1f))
                  hdr.addView(icoView(Ic.CLOSE,16,cText3,6).apply {
                      setOnClickListener { slideDownPanel() }
                  }, LinearLayout.LayoutParams(dp(30f),dp(30f)))
                  panel.addView(hdr)

                  // Tab bar
                  val tabBar = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL
                      background = object : Drawable() {
                          val p = Paint(Paint.ANTI_ALIAS_FLAG)
                          override fun draw(c: Canvas) {
                              p.color = Color.parseColor("#18FFFFFF")
                              c.drawRoundRect(RectF(bounds),dp(11f).toFloat(),dp(11f).toFloat(),p)
                          }
                          override fun setAlpha(a: Int) {}
                          override fun setColorFilter(f: ColorFilter?) {}
                          @Suppress("OVERRIDE_DEPRECATION")
                          override fun getOpacity() = PixelFormat.TRANSLUCENT
                      }
                      setPadding(dp(3f),dp(3f),dp(3f),dp(3f))
                  }
                  panel.addView(tabBar, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, dp(38f)
                  ).apply { setMargins(0,dp(10f),0,dp(8f)) })

                  val content = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL }
                  val scroll = ScrollView(this)
                  scroll.addView(content)
                  panel.addView(scroll, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, 0, 1f
                  ))

                  var activeTab = 0
                  val tabViews = mutableListOf<TextView>()

                  fun selectTab(i: Int) {
                      tabViews.forEachIndexed { idx, tv ->
                          tv.background = if (idx==i) accentGlass(9f) else null
                          tv.setTextColor(if (idx==i) cText else cText3)
                      }
                      content.removeAllViews()
                      when (i) {
                          0 -> { // HTML
                              val et = EditText(this).apply {
                                  setText(html); setTextColor(Color.parseColor("#E2E8F0"))
                                  setTextSize(TypedValue.COMPLEX_UNIT_SP,11.5f)
                                  background = codeBackground(); typeface = Typeface.MONOSPACE
                                  setPadding(dp(12f),dp(12f),dp(12f),dp(12f))
                                  gravity = Gravity.TOP; minLines = 5
                                  setHorizontallyScrolling(false)
                              }
                              content.addView(et)
                              content.addView(TextView(this).apply {
                                  text = "Apply Changes"; gravity = Gravity.CENTER
                                  setTextColor(cText); setTextSize(TypedValue.COMPLEX_UNIT_SP,14f)
                                  typeface = Typeface.create("sans-serif-medium", Typeface.NORMAL)
                                  background = ripple(accentGlass(12f))
                                  setOnClickListener {
                                      val esc = et.text.toString()
                                          .replace("\\","\\\\").replace("'","\\'").replace("\n","\\n")
                                      webView?.evaluateJavascript(
                                          "try{window.__wiSel&&(window.__wiSel.outerHTML='$esc')}catch(e){}", null
                                      )
                                      toast("Applied!")
                                  }
                              }, LinearLayout.LayoutParams(
                                  LinearLayout.LayoutParams.MATCH_PARENT, dp(46f)
                              ).apply { setMargins(0,dp(8f),0,0) })
                          }
                          1 -> content.addView(TextView(this).apply { // CSS
                              text = css; setTextColor(Color.parseColor("#7FDBCA"))
                              setTextSize(TypedValue.COMPLEX_UNIT_SP,11.5f)
                              background = codeBackground(); typeface = Typeface.MONOSPACE
                              setPadding(dp(12f),dp(12f),dp(12f),dp(12f))
                              setTextIsSelectable(true)
                          })
                          2 -> { // Preview
                              val wv = WebView(this)
                              wv.settings.javaScriptEnabled = true
                              wv.loadDataWithBaseURL(curUrl,
                                  "<html><body style='margin:10px;background:#fff'>$html</body></html>",
                                  "text/html","UTF-8",null)
                              content.addView(wv, LinearLayout.LayoutParams(
                                  LinearLayout.LayoutParams.MATCH_PARENT, dp(200f)
                              ))
                          }
                      }
                  }

                  listOf("HTML","CSS","Preview").forEachIndexed { i, name ->
                      val tv = TextView(this).apply {
                          text = name; gravity = Gravity.CENTER
                          setTextSize(TypedValue.COMPLEX_UNIT_SP,13f)
                          typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                          background = if (i==0) accentGlass(9f) else null
                          setTextColor(if (i==0) cText else cText3)
                          setPadding(dp(4f),dp(3f),dp(4f),dp(3f))
                          setOnClickListener { activeTab=i; selectTab(i) }
                      }
                      tabViews.add(tv)
                      tabBar.addView(tv, LinearLayout.LayoutParams(
                          0, ViewGroup.LayoutParams.MATCH_PARENT, 1f
                      ))
                  }
                  selectTab(0)
                  slideUpPanel()
              }

              private fun chip(text: String, color: Int) = TextView(this).apply {
                  this.text = text; setTextColor(color)
                  setTextSize(TypedValue.COMPLEX_UNIT_SP,12f)
                  typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                  background = object : Drawable() {
                      val p = Paint(Paint.ANTI_ALIAS_FLAG)
                      override fun draw(c: Canvas) {
                          val r = bounds.height()/2f
                          p.color = Color.argb(30,Color.red(color),Color.green(color),Color.blue(color))
                          c.drawRoundRect(RectF(bounds),r,r,p)
                          p.color = Color.argb(70,Color.red(color),Color.green(color),Color.blue(color))
                          p.style=Paint.Style.STROKE; p.strokeWidth=dp(0.6f).toFloat()
                          c.drawRoundRect(RectF(bounds),r,r,p); p.style=Paint.Style.FILL
                      }
                      override fun setAlpha(a: Int) {}
                      override fun setColorFilter(f: ColorFilter?) {}
                      @Suppress("OVERRIDE_DEPRECATION")
                      override fun getOpacity() = PixelFormat.TRANSLUCENT
                  }
                  setPadding(dp(10f),dp(4f),dp(10f),dp(4f))
                  layoutParams = LinearLayout.LayoutParams(
                      ViewGroup.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT
                  ).apply { setMargins(0,0,dp(6f),0) }
              }

              private fun codeBackground(): Drawable = object : Drawable() {
                  val p = Paint(Paint.ANTI_ALIAS_FLAG)
                  override fun draw(c: Canvas) {
                      val r = dp(12f).toFloat()
                      p.color = Color.parseColor("#0D1117")
                      c.drawRoundRect(RectF(bounds),r,r,p)
                      p.color = Color.parseColor("#20FFFFFF"); p.style=Paint.Style.STROKE
                      p.strokeWidth=dp(0.5f).toFloat()
                      c.drawRoundRect(RectF(bounds),r,r,p); p.style=Paint.Style.FILL
                  }
                  override fun setAlpha(a: Int) {}
                  override fun setColorFilter(f: ColorFilter?) {}
                  @Suppress("OVERRIDE_DEPRECATION")
                  override fun getOpacity() = PixelFormat.TRANSLUCENT
              }

              // ══════════════════════════════════════════════════════════
              //  SETTINGS
              // ══════════════════════════════════════════════════════════
              private fun showSettings() {
                  val d = Dialog(this, android.R.style.Theme_NoTitleBar_Fullscreen)
                  val overlay = FrameLayout(this).apply {
                      setBackgroundColor(Color.parseColor("#88000000"))
                      setOnClickListener { d.dismiss() }
                  }

                  val sheetScroll = ScrollView(this)
                  val sheet = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      background = glass(28f)
                      setPadding(dp(20f),dp(8f),dp(20f),dp(36f))
                      elevation = dp(24f).toFloat()
                      setOnClickListener {}
                  }

                  // Handle
                  sheet.addView(View(this).apply {
                      background = GradientDrawable().apply {
                          setColor(Color.parseColor("#40FFFFFF")); cornerRadius = dp(2f).toFloat()
                      }
                  }, LinearLayout.LayoutParams(dp(36f),dp(4f)).apply {
                      gravity = Gravity.CENTER_HORIZONTAL; setMargins(0,dp(8f),0,dp(16f))
                  }.also { (it as LinearLayout.LayoutParams).gravity = Gravity.CENTER_HORIZONTAL })

                  // Title
                  sheet.addView(row(ico(Ic.SETTINGS,20,cAccent), "Settings", 20f, cText, bold=true))
                  sheet.addView(divider())

                  // UI Toggle
                  sheet.addView(sectionLabel("Browser Mode"))
                  var uiOn = getShowUi()
                  val toggleRow = buildToggleRow(
                      Ic.INSPECT,"Show Inspector Tools",
                      "Hide toolbar for pure browser mode", uiOn
                  ) { on ->
                      uiOn = on
                      prefs?.edit()?.putBoolean(P_SHOW_UI,on)?.apply()
                      applyUi()
                  }
                  sheet.addView(toggleRow)
                  sheet.addView(divider())

                  // Search engine
                  sheet.addView(sectionLabel("Search Engine"))
                  val engines = listOf(
                      EG to "Google", EY to "Yandex",
                      EB to "Bing", ED to "DuckDuckGo", EBR to "Brave"
                  )
                  val cur = getEngine()
                  val engineRowViews = mutableListOf<LinearLayout>()
                  engines.forEach { (key, name) ->
                      val r = engineRow(name, key == cur) {
                          prefs?.edit()?.putString(P_ENGINE,key)?.apply()
                          engineRowViews.forEach { rv ->
                              val k = rv.getTag() as? String ?: return@forEach
                              val tv = rv.getChildAt(1) as? TextView
                              val iv = rv.getChildAt(2) as? ImageView
                              tv?.setTextColor(if (k==key) cAccent else cText2)
                              iv?.setImageBitmap(ico(Ic.CHECK,16,if(k==key) cAccent else Color.TRANSPARENT))
                          }
                      }
                      r.tag = key
                      engineRowViews.add(r)
                      sheet.addView(r)
                  }
                  sheet.addView(divider())
                  sheet.addView(TextView(this).apply {
                      text = "WebInspector 1.0  ·  iOS 26 Glass"
                      setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP,11f)
                      setPadding(0,dp(8f),0,0)
                  })

                  sheetScroll.addView(sheet)
                  val h = (resources.displayMetrics.heightPixels * 0.80).toInt()
                  overlay.addView(sheetScroll, FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT, h, Gravity.BOTTOM
                  ).apply { setMargins(dp(6f),0,dp(6f),0) })

                  d.setContentView(overlay); d.show()
                  sheetScroll.translationY = h.toFloat()
                  sheetScroll.animate().translationY(0f).setDuration(360)
                      .setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

              private fun row(bmp: Bitmap, text: String, sp: Float, col: Int, bold: Boolean=false): LinearLayout {
                  return LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                      addView(ImageView(this@MainActivity).apply { setImageBitmap(bmp) },
                          LinearLayout.LayoutParams(dp(24f),dp(24f)).apply { setMargins(0,0,dp(10f),0) })
                      addView(TextView(this@MainActivity).apply {
                          text = text; setTextColor(col); setTextSize(TypedValue.COMPLEX_UNIT_SP, sp)
                          if (bold) typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                      })
                  }
              }

              private fun sectionLabel(t: String) = TextView(this).apply {
                  text = t; setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP, 12f)
                  typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                  setPadding(0,dp(12f),0,dp(4f))
              }

              private fun divider() = View(this).apply {
                  setBackgroundColor(Color.parseColor("#1EFFFFFF"))
                  layoutParams = LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, 1
                  ).apply { setMargins(0,dp(6f),0,dp(6f)) }
              }

              private fun buildToggleRow(
                  ic: Ic, title: String, sub: String, init: Boolean, cb: (Boolean)->Unit
              ): LinearLayout {
                  var state = init
                  val track = GradientDrawable().apply {
                      setColor(if (state) cAccent else Color.parseColor("#38FFFFFF"))
                      cornerRadius = dp(14f).toFloat()
                  }
                  val thumb = View(this).apply {
                      background = GradientDrawable().apply {
                          setColor(Color.WHITE); cornerRadius = dp(11f).toFloat()
                          setStroke(1, Color.parseColor("#15000000"))
                      }
                      elevation = dp(2f).toFloat()
                  }
                  val toggleView = FrameLayout(this).apply {
                      background = track
                      addView(thumb, FrameLayout.LayoutParams(dp(22f),dp(22f),Gravity.CENTER_VERTICAL).apply {
                          setMargins(if (state) dp(24f) else dp(3f), 0, 0, 0)
                      })
                  }

                  val doToggle = {
                      state = !state
                      track.setColor(if (state) cAccent else Color.parseColor("#38FFFFFF"))
                      val toM = if (state) dp(24f) else dp(3f)
                      thumb.animate().translationX((toM - thumb.left).toFloat()).setDuration(200)
                          .setInterpolator(DecelerateInterpolator(2f)).withEndAction {
                              (thumb.layoutParams as FrameLayout.LayoutParams).setMargins(toM,0,0,0)
                              thumb.translationX = 0f
                              thumb.requestLayout()
                          }.start()
                      cb(state)
                  }

                  return LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                      setPadding(0,dp(10f),0,dp(10f))
                      background = ripple(ColorDrawable(Color.TRANSPARENT))
                      setOnClickListener { doToggle() }
                      addView(ImageView(this@MainActivity).apply {
                          setImageBitmap(ico(ic,20,cText2))
                      }, LinearLayout.LayoutParams(dp(22f),dp(22f)).apply { setMargins(0,0,dp(14f),0) })
                      val col = LinearLayout(this@MainActivity).apply {
                          orientation = LinearLayout.VERTICAL
                          addView(TextView(this@MainActivity).apply {
                              text = title; setTextColor(cText2); setTextSize(TypedValue.COMPLEX_UNIT_SP,15f)
                          })
                          addView(TextView(this@MainActivity).apply {
                              text = sub; setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP,12f)
                          })
                      }
                      addView(col, LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                      addView(toggleView, LinearLayout.LayoutParams(dp(48f),dp(28f)))
                  }
              }

              private fun engineRow(name: String, selected: Boolean, cb: ()->Unit): LinearLayout {
                  return LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                      setPadding(0,dp(11f),0,dp(11f))
                      background = ripple(ColorDrawable(Color.TRANSPARENT))
                      setOnClickListener { cb() }
                      addView(ImageView(this@MainActivity).apply {
                          setImageBitmap(ico(Ic.GLOBE,18,cText3))
                      }, LinearLayout.LayoutParams(dp(22f),dp(22f)).apply { setMargins(0,0,dp(14f),0) })
                      addView(TextView(this@MainActivity).apply {
                          text = name
                          setTextColor(if (selected) cAccent else cText2)
                          setTextSize(TypedValue.COMPLEX_UNIT_SP,15f)
                      }, LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                      addView(ImageView(this@MainActivity).apply {
                          setImageBitmap(ico(Ic.CHECK,16,if (selected) cAccent else Color.TRANSPARENT))
                      }, LinearLayout.LayoutParams(dp(20f),dp(20f)))
                  }
              }

              // ══════════════════════════════════════════════════════════
              //  SOURCE
              // ══════════════════════════════════════════════════════════
              private fun showSource() {
                  webView?.evaluateJavascript(
                      "(function(){return document.documentElement.outerHTML})();"
                  ) { res ->
                      val html = res?.removeSurrounding("\"")
                          ?.replace("\\n","\n")?.replace("\\t","\t")?.replace("\\\"","\"") ?: ""
                      showCodeSheet("Page Source", html)
                  }
              }

              private fun showCodeSheet(title: String, code: String) {
                  val d = Dialog(this, android.R.style.Theme_NoTitleBar_Fullscreen)
                  val overlay = FrameLayout(this).apply {
                      setBackgroundColor(Color.parseColor("#88000000"))
                      setOnClickListener { d.dismiss() }
                  }
                  val sheet = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      background = glass(28f)
                      setPadding(dp(16f),dp(14f),dp(16f),dp(20f))
                      elevation = dp(20f).toFloat()
                      setOnClickListener {}
                  }
                  val hdr = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                  }
                  hdr.addView(TextView(this).apply {
                      text = title; setTextColor(cText); setTextSize(TypedValue.COMPLEX_UNIT_SP,17f)
                      typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                  }, LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                  hdr.addView(icoView(Ic.DOWNLOAD,20,cAccent,8).apply {
                      setOnClickListener { saveFile("source.html",code); d.dismiss() }
                  }, LinearLayout.LayoutParams(dp(38f),dp(38f)))
                  hdr.addView(icoView(Ic.CLOSE,18,cText3,8).apply {
                      setOnClickListener { d.dismiss() }
                  }, LinearLayout.LayoutParams(dp(38f),dp(38f)))
                  sheet.addView(hdr)
                  sheet.addView(TextView(this).apply {
                      text = "${code.lines().size} lines · ${code.length} chars"
                      setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP,11f)
                      setPadding(0,dp(4f),0,dp(10f))
                  })
                  val sv = ScrollView(this)
                  val hsv = HorizontalScrollView(this)
                  hsv.addView(TextView(this).apply {
                      text = code; setTextColor(Color.parseColor("#E2E8F0"))
                      setTextSize(TypedValue.COMPLEX_UNIT_SP,11f); typeface = Typeface.MONOSPACE
                      setBackgroundColor(Color.parseColor("#0D1117"))
                      setPadding(dp(12f),dp(12f),dp(12f),dp(12f)); setTextIsSelectable(true)
                  })
                  sv.addView(hsv)
                  sheet.addView(sv, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, 0, 1f
                  ))
                  val h = (resources.displayMetrics.heightPixels * 0.86).toInt()
                  overlay.addView(sheet, FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT, h, Gravity.BOTTOM
                  ).apply { setMargins(dp(6f),0,dp(6f),0) })
                  d.setContentView(overlay); d.show()
                  sheet.translationY = h.toFloat()
                  sheet.animate().translationY(0f).setDuration(370)
                      .setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

              // ══════════════════════════════════════════════════════════
              //  FILES
              // ══════════════════════════════════════════════════════════
              private fun showFiles() {
                  webView?.evaluateJavascript("""
                      (function(){
                          var r={js:[],css:[],img:[]};
                          document.querySelectorAll('script[src]').forEach(function(s){r.js.push(s.src);});
                          document.querySelectorAll('link[rel=stylesheet]').forEach(function(l){r.css.push(l.href);});
                          document.querySelectorAll('img[src]').forEach(function(i){r.img.push(i.src);});
                          return JSON.stringify(r);
                      })();
                  """.trimIndent()) { res ->
                      val json = res?.removeSurrounding("\"")?.replace("\\\"","\"") ?: "{}"
                      showFilesSheet(json)
                  }
              }

              private fun showFilesSheet(json: String) {
                  val sections = mutableListOf<Pair<String,List<String>>>()
                  listOf("js" to "Scripts","css" to "Styles","img" to "Images").forEach { (k,label) ->
                      val m = Regex(""""$k":\[([^\]]*)]""").find(json)
                      if (m != null) {
                          val urls = Regex(""""(https?://[^"]+)"""").findAll(m.groupValues[1])
                              .map { it.groupValues[1] }.toList()
                          if (urls.isNotEmpty()) sections.add(label to urls)
                      }
                  }
                  val allUrls = sections.flatMap { it.second }

                  val d = Dialog(this, android.R.style.Theme_NoTitleBar_Fullscreen)
                  val overlay = FrameLayout(this).apply {
                      setBackgroundColor(Color.parseColor("#88000000"))
                      setOnClickListener { d.dismiss() }
                  }
                  val sheet = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      background = glass(28f)
                      setPadding(dp(16f),dp(14f),dp(16f),dp(20f))
                      elevation = dp(20f).toFloat()
                      setOnClickListener {}
                  }
                  val hdr = LinearLayout(this).apply {
                      orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                  }
                  hdr.addView(TextView(this).apply {
                      text = "Site Files"; setTextColor(cText); setTextSize(TypedValue.COMPLEX_UNIT_SP,18f)
                      typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                  }, LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                  hdr.addView(icoView(Ic.CLOSE,18,cText3,8).apply {
                      setOnClickListener { d.dismiss() }
                  }, LinearLayout.LayoutParams(dp(38f),dp(38f)))
                  sheet.addView(hdr)
                  sheet.addView(TextView(this).apply {
                      text = "${allUrls.size} resources · tap to view"
                      setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP,11f)
                      setPadding(0,dp(4f),0,dp(8f))
                  })

                  val sv = ScrollView(this)
                  val list = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL }
                  sections.forEach { (label, urls) ->
                      list.addView(TextView(this).apply {
                          text = label.uppercase(); setTextColor(cAccent)
                          setTextSize(TypedValue.COMPLEX_UNIT_SP,10.5f)
                          typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                          setPadding(dp(2f),dp(12f),0,dp(4f))
                      })
                      urls.forEach { url ->
                          val fileIc = if (url.endsWith(".js")) Ic.CODE else if (url.endsWith(".css")) Ic.STAR else Ic.DOWNLOAD
                          list.addView(LinearLayout(this).apply {
                              orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL
                              background = ripple(object : Drawable() {
                                  val p = Paint(Paint.ANTI_ALIAS_FLAG)
                                  override fun draw(c: Canvas) {
                                      p.color = Color.parseColor("#12FFFFFF")
                                      c.drawRoundRect(RectF(bounds),dp(10f).toFloat(),dp(10f).toFloat(),p)
                                  }
                                  override fun setAlpha(a: Int) {}
                                  override fun setColorFilter(f: ColorFilter?) {}
                                  @Suppress("OVERRIDE_DEPRECATION")
                                  override fun getOpacity() = PixelFormat.TRANSLUCENT
                              })
                              setPadding(dp(10f),dp(9f),dp(10f),dp(9f))
                              setOnClickListener { showCodeSheet(url.substringAfterLast("/"), url) }
                              addView(ImageView(this@MainActivity).apply {
                                  setImageBitmap(ico(fileIc,15,cText3))
                              }, LinearLayout.LayoutParams(dp(20f),dp(20f)).apply { setMargins(0,0,dp(10f),0) })
                              addView(LinearLayout(this@MainActivity).apply {
                                  orientation = LinearLayout.VERTICAL
                                  addView(TextView(this@MainActivity).apply {
                                      text = url.substringAfterLast("/").take(42)
                                      setTextColor(cText2); setTextSize(TypedValue.COMPLEX_UNIT_SP,12.5f)
                                  })
                                  addView(TextView(this@MainActivity).apply {
                                      text = url.substringAfter("://").substringBefore("/")
                                      setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP,10.5f)
                                  })
                              }, LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f))
                              addView(icoView(Ic.DOWNLOAD,14,cText3,4).apply {
                                  setOnClickListener { dlFile(url) }
                              }, LinearLayout.LayoutParams(dp(24f),dp(24f)))
                          }, LinearLayout.LayoutParams(
                              LinearLayout.LayoutParams.MATCH_PARENT,
                              ViewGroup.LayoutParams.WRAP_CONTENT
                          ).apply { setMargins(0,dp(2f),0,dp(2f)) })
                      }
                  }
                  sv.addView(list)
                  sheet.addView(sv, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, 0, 1f
                  ))
                  sheet.addView(TextView(this).apply {
                      text = "↓  Download ZIP"
                      gravity = Gravity.CENTER; setTextColor(cText)
                      setTextSize(TypedValue.COMPLEX_UNIT_SP,14f)
                      typeface = Typeface.create("sans-serif-medium",Typeface.NORMAL)
                      background = ripple(accentGlass(14f))
                      setOnClickListener { d.dismiss(); dlZip(allUrls) }
                  }, LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT, dp(50f)
                  ).apply { setMargins(0,dp(12f),0,0) })

                  val h = (resources.displayMetrics.heightPixels * 0.86).toInt()
                  overlay.addView(sheet, FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT, h, Gravity.BOTTOM
                  ).apply { setMargins(dp(6f),0,dp(6f),0) })
                  d.setContentView(overlay); d.show()
                  sheet.translationY = h.toFloat()
                  sheet.animate().translationY(0f).setDuration(370)
                      .setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

              // ══════════════════════════════════════════════════════════
              //  DOWNLOAD
              // ══════════════════════════════════════════════════════════
              private fun dlFile(url: String) {
                  toast("Downloading…")
                  scope.launch(Dispatchers.IO) {
                      try {
                          val conn = URL(url).openConnection() as HttpURLConnection
                          conn.connectTimeout = 8000; conn.readTimeout = 8000; conn.connect()
                          if (conn.responseCode == 200) {
                              val name = url.substringAfterLast("/").take(80).ifEmpty { "file" }
                              val f = File(getExternalFilesDir(null) ?: filesDir, name)
                              f.outputStream().use { conn.inputStream.copyTo(it) }
                              withContext(Dispatchers.Main) { toast("Saved: ${f.name}") }
                          }
                      } catch (e: Exception) {
                          withContext(Dispatchers.Main) { toast("Error: ${e.message}") }
                      }
                  }
              }

              private fun dlZip(urls: List<String>) {
                  if (urls.isEmpty()) { toast("No files"); return }
                  toast("Zipping ${urls.size} files…")
                  scope.launch(Dispatchers.IO) {
                      try {
                          val dir = getExternalFilesDir(null) ?: filesDir
                          val zip = File(dir,"site_${System.currentTimeMillis()}.zip")
                          ZipOutputStream(BufferedOutputStream(FileOutputStream(zip))).use { zos ->
                              urls.take(60).forEach { url ->
                                  try {
                                      val conn = URL(url).openConnection() as HttpURLConnection
                                      conn.connectTimeout = 5000; conn.readTimeout = 5000; conn.connect()
                                      if (conn.responseCode == 200) {
                                          val n = url.substringAfterLast("/").take(80).ifEmpty{"file"}
                                          zos.putNextEntry(ZipEntry(n))
                                          conn.inputStream.copyTo(zos); zos.closeEntry()
                                      }
                                  } catch (_: Exception) {}
                              }
                          }
                          withContext(Dispatchers.Main) { toast("ZIP: ${zip.name}") }
                      } catch (e: Exception) {
                          withContext(Dispatchers.Main) { toast("Zip error: ${e.message}") }
                      }
                  }
              }

              // ══════════════════════════════════════════════════════════
              //  JS
              // ══════════════════════════════════════════════════════════
              private fun jsInspect() = """
                  (function(){
                      try{
                          var s=document.createElement('style');s.id='__wis';
                          s.textContent='.wi{outline:2px solid #6C63FF!important;background:rgba(108,99,255,0.06)!important}';
                          document.head.appendChild(s);
                          window.__wiSel=null;
                          function ov(e){document.querySelectorAll('.wi').forEach(function(x){x.classList.remove('wi');});e.target.classList.add('wi');}
                          function cl(e){
                              e.preventDefault();e.stopPropagation();
                              window.__wiSel=e.target;
                              var el=e.target,tag=el.tagName.toLowerCase(),id=el.id||'';
                              var html=el.outerHTML.substring(0,2000);
                              var cs=window.getComputedStyle(el);
                              var pp=['display','position','width','height','color','background-color',
                                  'font-size','font-weight','border','border-radius','margin','padding',
                                  'opacity','z-index','overflow','transform'];
                              var css=pp.map(function(p){return p+': '+cs.getPropertyValue(p)+';'}).join('\n');
                              window.WebInspector.onEl(tag,id,encodeURIComponent(html),encodeURIComponent(css));
                          }
                          document.addEventListener('mouseover',ov,true);
                          document.addEventListener('click',cl,true);
                          window.__wiClean=function(){
                              document.removeEventListener('mouseover',ov,true);
                              document.removeEventListener('click',cl,true);
                              document.querySelectorAll('.wi').forEach(function(x){x.classList.remove('wi');});
                              var st=document.getElementById('__wis');if(st)st.remove();
                          };
                      }catch(err){}
                  })();
              """.trimIndent()

              inner class JsBridge {
                  @JavascriptInterface
                  fun onEl(tag: String, id: String, hEnc: String, cEnc: String) {
                      val h = try { java.net.URLDecoder.decode(hEnc,"UTF-8") } catch(e:Exception){hEnc}
                      val c = try { java.net.URLDecoder.decode(cEnc,"UTF-8") }  catch(e:Exception){cEnc}
                      runOnUiThread { showElement(tag,id,h,c) }
                  }
              }

              // ── Helpers ────────────────────────────────────────────────
              private fun saveFile(name: String, content: String) {
                  try {
                      File(getExternalFilesDir(null) ?: filesDir, name).writeText(content)
                      toast("Saved!")
                  } catch (e: Exception) { toast("Save error: ${e.message}") }
              }

              private fun toast(msg: String) =
                  Toast.makeText(this, msg, Toast.LENGTH_SHORT).show()

              @Suppress("OVERRIDE_DEPRECATION")
              override fun onBackPressed() {
                  when {
                      inspMode -> toggleInspector()
                      webView?.canGoBack() == true -> webView?.goBack()
                      else -> super.onBackPressed()
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  scope.cancel()
                  webView?.stopLoading()
                  webView?.destroy()
                  webView = null
              }
          }
          KOTLIN

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools \
             $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk"             >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk"         >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools"           >> $GITHUB_PATH

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: local.properties
        run: echo "sdk.dir=$HOME/android-sdk" > local.properties

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WebInspector-APK
          path: app/build/outputs/apk/debug/app-debug.apk
