              private fun showSettings() {
                  val d=Dialog(this,android.R.style.Theme_NoTitleBar_Fullscreen)
                  val overlay=FrameLayout(this).apply{
                      setBackgroundColor(Color.parseColor("#88000000"))
                      setOnClickListener{d.dismiss()}
                  }
                  val sv=ScrollView(this)
                  val sheet=LinearLayout(this).apply{
                      orientation=LinearLayout.VERTICAL; background=glass(28f)
                      setPadding(dp(20f),dp(8f),dp(20f),dp(36f)); elevation=dp(24f).toFloat()
                      setOnClickListener{}
                  }
                  // handle
                  sheet.addView(View(this).apply{
                      background=GradientDrawable().apply{setColor(Color.parseColor("#40FFFFFF"));cornerRadius=dp(2f).toFloat()}
                  },LinearLayout.LayoutParams(dp(36f),dp(4f)).apply{
                      gravity=Gravity.CENTER_HORIZONTAL;setMargins(0,dp(8f),0,dp(16f))
                  }.also{(it as LinearLayout.LayoutParams).gravity=Gravity.CENTER_HORIZONTAL})

                  // Title
                  sheet.addView(LinearLayout(this).apply{
                      orientation=LinearLayout.HORIZONTAL; gravity=Gravity.CENTER_VERTICAL
                      addView(ImageView(this@MainActivity).apply{setImageBitmap(ico(Ic.GEAR,20,cAcc))},
                          LinearLayout.LayoutParams(dp(24f),dp(24f)))
                      addView(TextView(this@MainActivity).apply{
                          text="  Settings"; setTextColor(cText); setTextSize(TypedValue.COMPLEX_UNIT_SP,20f)
                          typeface=Typeface.create("sans-serif-medium",Typeface.NORMAL)
                      })
                  })
                  sheet.addView(div())

                  // UI toggle
                  sheet.addView(secLabel("Browser Mode"))
                  var uiOn=showUi()
                  sheet.addView(togRow(Ic.INSPECT,"Show Inspector Tools",
                      "Disable for pure browser mode",uiOn){on->
                      uiOn=on; prefs?.edit()?.putBoolean(P_UI,on)?.apply(); applyUi()
                  })
                  sheet.addView(div())

                  // Search engine
                  sheet.addView(secLabel("Search Engine"))
                  val engs=listOf(EG to "Google",EY to "Yandex",EB to "Bing",ED to "DuckDuckGo",EBR to "Brave")
                  val curEng=eng(); val eRows= mutableListOf<LinearLayout>()
                  engs.forEach{(key,name)->
                      val r=engRow(name,key==curEng){
                          prefs?.edit()?.putString(P_ENG,key)?.apply()
                          eRows.forEach{rv->
                              val k=rv.tag as? String?:return@forEach
                              (rv.getChildAt(1) as? TextView)?.setTextColor(if(k==key)cAcc else cText2)
                              (rv.getChildAt(2) as? ImageView)?.setImageBitmap(
                                  ico(Ic.CHECK,16,if(k==key)cAcc else Color.TRANSPARENT))
                          }
                      }
                      r.tag=key; eRows.add(r); sheet.addView(r)
                  }
                  sheet.addView(div())
                  sheet.addView(TextView(this).apply{
                      text="WebInspector 1.0"; setTextColor(cText3); setTextSize(TypedValue.COMPLEX_UNIT_SP,11f)
                      setPadding(0,dp(8f),0,0)
                  })

                  sv.addView(sheet)
                  val h=(resources.displayMetrics.heightPixels*0.80).toInt()
                  overlay.addView(sv,FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,h,Gravity.BOTTOM
                  ).apply{setMargins(dp(6f),0,dp(6f),0)})
                  d.setContentView(overlay); d.show()
                  sv.translationY=h.toFloat()
                  sv.animate().translationY(0f).setDuration(360).setInterpolator(DecelerateInterpolator(2.5f)).start()
              }

