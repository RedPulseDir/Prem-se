version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01
    steps:
      - checkout
      - run:
          name: Make gradlew executable
          command: chmod +x gradlew
      - run:
          name: Build APK
          command: ./gradlew assembleDebug
      - store_artifacts:
          path: app/build/outputs/apk/debug/app-debug.apk
          destination: WebInspector.apk

workflows:
  build_apk:
    jobs:
      - build
